name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for trusted publishing (OIDC); remove if using API token.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --extra ollama

      - name: Verify version consistency
        run: |
          PKG_VER=$(uv run python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VER=$(uv run python -c "import modeldock; print(modeldock.__version__)")
          TAG=${GITHUB_REF_NAME#v}
          echo "pyproject=$PKG_VER  __init__=$INIT_VER  tag=$TAG"
          if [ "$PKG_VER" != "$INIT_VER" ] || [ "$PKG_VER" != "$TAG" ]; then
            echo "Version mismatch: pyproject=$PKG_VER __init__=$INIT_VER tag=$TAG"
            exit 1
          fi

      - name: Run quality gates
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src
          uv run bandit -r src
          uv run pytest

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) by default. To use a token instead,
        # set repository-url and pass the token via secrets.PYPI_API_TOKEN.

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
